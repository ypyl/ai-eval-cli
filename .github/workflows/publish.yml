name: Publish

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Extract version from tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Publish linux-x64
        run: dotnet publish src/AiEvalCli -c Release -r linux-x64 -p:Version=${{ env.VERSION }} -o ./out/linux-x64

      - name: Publish win-x64
        run: dotnet publish src/AiEvalCli -c Release -r win-x64 -p:Version=${{ env.VERSION }} -o ./out/win-x64

      - name: Publish osx-arm64
        run: dotnet publish src/AiEvalCli -c Release -r osx-arm64 -p:Version=${{ env.VERSION }} -o ./out/osx-arm64

      - name: Pack NuGet package
        run: dotnet pack src/AiEvalCli -c Release -p:Version=${{ env.VERSION }} -o ./artifacts

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ${{ secrets.NUGET_USERNAME }}

      - name: Push to NuGet
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./out/linux-x64/eval-cli
            ./out/win-x64/eval-cli.exe
            ./out/osx-arm64/eval-cli
